<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=900, initial-scale=1.0"/>
  <title>Polo Shirt 3D Design Showcase</title>
  <style>
    body { margin: 0; padding: 0; font-family: 'Inter', Arial, sans-serif; background: #f5f6f8; display: flex; min-height: 100vh;}
    .content { width: 44vw; min-width: 320px; display: flex; flex-direction: column; justify-content: center; align-items: flex-end; padding: 5vw 2vw 0 6vw;}
    .content h1 { font-size: 2.8em; font-weight: bold; margin: 0 0 0.5em 0; line-height: 1.1;}
    .content p { font-size: 1.2em; color: #444; max-width: 29vw; margin: 0;}
    .viewer { width: 56vw; min-width: 340px; display: flex; align-items: center; justify-content: flex-start;}
    #tshirt-viewer { width: 520px; height: 520px; max-width: 97vw; }
    @media (max-width: 900px) {
      body { flex-direction: column; }
      .content, .viewer { width: 100vw; align-items: center; padding: 3vw 0; }
      #tshirt-viewer { width: 98vw; height: 350px;}
    }
  </style>
</head>
<body>
  <div class="content">
    <h1>My Polo Shirt Design</h1>
    <p>
      This polo shirt features a custom design on both the front and back. Rotate the shirt to explore both sides in 3D!
    </p>
  </div>
  <div class="viewer">
    <div id="tshirt-viewer"></div>
  </div>

  <!-- Three.js, GLTFLoader & OrbitControls via CDN -->
  <script src="https://unpkg.com/three@0.153.0/build/three.min.js"></script>
  <script src="https://unpkg.com/three@0.153.0/examples/js/loaders/GLTFLoader.js"></script>
  <script src="https://unpkg.com/three@0.153.0/examples/js/controls/OrbitControls.js"></script>
  <!-- Your logic -->
  <script src="main.js"></script>
</body>
</html>
